name: Build wheels

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux-x86_64:
    name: Linux x86_64 wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: cp39-manylinux_x86_64 cp310-manylinux_x86_64 cp311-manylinux_x86_64 cp312-manylinux_x86_64
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BUILD_VERBOSITY: 1
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: wheelhouse/

  build-linux-aarch64:
    name: Linux ARM64 wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: cp39-manylinux_aarch64 cp310-manylinux_aarch64 cp311-manylinux_aarch64 cp312-manylinux_aarch64
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          CIBW_ARCHS: aarch64
          CIBW_BUILD_VERBOSITY: 1
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-aarch64
          path: wheelhouse/

  build-macos-arm64:
    name: macOS ARM64 wheels
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: cp39-macosx_arm64 cp310-macosx_arm64 cp311-macosx_arm64 cp312-macosx_arm64
          CIBW_BUILD_VERBOSITY: 1
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-arm64
          path: wheelhouse/

  build-windows:
    name: Windows x86_64 wheels
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: cp39-win_amd64 cp310-win_amd64 cp311-win_amd64 cp312-win_amd64
          CIBW_BUILD_VERBOSITY: 1
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: wheelhouse/

  publish:
    name: Publish to PyPI
    needs:
      [
        build-linux-x86_64,
        build-linux-aarch64,
        build-macos-arm64,
        build-windows,
      ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
